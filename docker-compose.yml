services:
  exercise-timer:
    image: ghcr.io/chainatao/exercise-timer:latest
    container_name: exercise-timer
    restart: unless-stopped
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.exercise-timer-http.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.exercise-timer-http.entrypoints=web"
      - "traefik.http.routers.exercise-timer-http.middlewares=exercise-timer-https-redirect"
      - "traefik.http.middlewares.exercise-timer-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.exercise-timer-https-redirect.redirectscheme.permanent=true"
      # HTTPS
      - "traefik.http.routers.exercise-timer.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.exercise-timer.entrypoints=websecure"
      - "traefik.http.routers.exercise-timer.tls=true"
      - "traefik.http.routers.exercise-timer.tls.certresolver=myresolver"
      - "traefik.http.services.exercise-timer.loadbalancer.server.port=8000"

networks:
  traefik:
    external: true
